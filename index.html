<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CartShare</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-container">

<h1>CartShare</h1>

<p>Collaborative Shopping Cart</p>

<input
type="text"
id="username"
placeholder="Enter Your Name">

<input
type="text"
id="roomCode"
placeholder="Enter Room Code (for Join Room)">

<div class="btn-group">

<button id="createRoomBtn">
Create Room
</button>

<button id="joinRoomBtn">
Join Room
</button>

</div>

</div>

<script type="module" src="auth.js"></script>

</body>
</html>
